name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Typecheck + Build ────────────────────────────────────────────────────
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma generate does not need a real DB — it only reads schema.prisma
      # and produces the TypeScript client. Required before tsc can resolve
      # the generated types.
      - name: Generate Prisma clients
        run: |
          pnpm --filter user-service exec prisma generate
          pnpm --filter order-service exec prisma generate
          pnpm --filter product-service exec prisma generate

      - name: Build all packages
        run: pnpm --recursive build

  # ─── Docker Build (on push to main only) ─────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: docker compose build
